name: Daily Briefing

"on":
  schedule:
    # 20:05 UTC every day (~04:05 CST) — early generation to avoid GitHub congestion
    - cron: "5 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch raw data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: npm run fetch-data

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate-briefing

      - name: Commit and push edition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          EDITION_FILE="data/editions/${DATE}.json"
          if [ -f "$EDITION_FILE" ]; then
            git add "$EDITION_FILE"
            git commit -m "📰 棱镜 ${DATE}" || echo "No changes to commit"
            git push
          else
            echo "⚠ No edition file generated for ${DATE}"
            exit 1
          fi
